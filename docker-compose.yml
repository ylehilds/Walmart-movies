services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    ports:
      - "8085:8080"

  cosmosdb:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator
    platform: linux/amd64
    hostname: cosmosdb
    privileged: true
    mem_limit: 3g
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 2
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: cosmosdb
    ports:
      - "8081:8081"
      - "10250-10255:10250-10255"
    healthcheck:
      test: ["CMD", "curl", "-f", "https://localhost:8081/_explorer/emulator.pem"]
      interval: 20s
      timeout: 10s
      retries: 10

  api:
    build: ./backend
    depends_on:
      kafka:
        condition: service_started
    environment:
      AZURE_COSMOS_URI: ${AZURE_COSMOS_URI}
      AZURE_COSMOS_KEY: ${AZURE_COSMOS_KEY}
      AZURE_COSMOS_DB: ${AZURE_COSMOS_DB}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MOVIE_EVENTS_TOPIC: movies.events
      MOVIES_PERSISTENCE: ${MOVIES_PERSISTENCE}
      COSMOS_EMULATOR_SKIP: ${COSMOS_EMULATOR_SKIP}
      JAVA_OPTS: "-Djavax.net.ssl.trustStorePassword=changeit"
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
